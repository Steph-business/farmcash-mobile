<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FarmCash — Retirer mon argent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --primary:#2E7D32;--primary-hover:#256528;--bg:#FFFFFF;
    --text:#111827;--text-muted:#6B7280;--text-subtle:#9CA3AF;
    --border:#E5E7EB;--border-strong:#D1D5DB;--bg-soft:#F9FAFB;
    --error:#C62828;--primary-soft:#E8F5E9;
    --warn:#B45309;--warn-soft:#FEF3C7;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
  html,body{font-family:'Inter',sans-serif;background:#ECEFF1;color:var(--text);}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;}

  .phone{width:390px;height:844px;background:#1a1a1a;border-radius:50px;padding:14px;box-shadow:0 30px 60px rgba(0,0,0,0.18);position:relative;}
  .phone::before{content:"";position:absolute;top:14px;left:50%;transform:translateX(-50%);width:130px;height:32px;background:#1a1a1a;border-radius:0 0 22px 22px;z-index:10;}
  .screen{width:100%;height:100%;background:var(--bg);border-radius:38px;overflow:hidden;position:relative;display:flex;flex-direction:column;}

  .status-bar{height:48px;padding:18px 30px 0;display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:600;flex-shrink:0;}
  .status-bar .icons{display:flex;gap:6px;align-items:center;color:var(--text);}

  .header{padding:8px 16px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);}
  .back-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;color:var(--text);cursor:pointer;}
  .header .title{flex:1;font-size:15px;font-weight:600;}

  .content{flex:1;overflow-y:auto;padding:16px 20px 110px;}

  .balance-card{background:var(--primary-soft);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:18px;text-align:center;}
  .balance-card .lbl{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.4px;font-weight:600;}
  .balance-card .v{font-family:'Poppins';font-size:22px;font-weight:700;color:var(--primary);margin-top:4px;letter-spacing:-0.3px;}

  .amount-wrap{text-align:center;padding:14px 0 18px;}
  .amount-input{font-family:'Poppins';font-size:36px;font-weight:700;color:var(--text);border:none;outline:none;background:transparent;text-align:center;width:100%;letter-spacing:-1px;}
  .amount-input::placeholder{color:var(--text-subtle);}
  .amount-suffix{font-family:'Poppins';font-size:14px;font-weight:600;color:var(--text-muted);margin-top:4px;letter-spacing:0.5px;}

  .quick-chips{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;justify-content:center;}
  .qchip{padding:7px 14px;border-radius:18px;border:1px solid var(--border);background:var(--bg-soft);font-size:12px;font-weight:600;color:var(--text);cursor:pointer;}
  .qchip.active{border-color:var(--primary);color:var(--primary);background:var(--primary-soft);}
  .qchip.tout{border-color:var(--primary);color:var(--primary);background:var(--bg);}

  .section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;color:var(--text-muted);margin-bottom:8px;padding-left:4px;}

  .selector{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;align-items:center;gap:12px;margin-bottom:18px;cursor:pointer;}
  .selector .logo{width:40px;height:40px;border-radius:10px;background:#FF6B00;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:700;font-size:11px;letter-spacing:0.5px;}
  .selector .body{flex:1;min-width:0;}
  .selector .t{font-size:13px;font-weight:600;color:var(--text);}
  .selector .s{font-size:11px;color:var(--text-muted);margin-top:2px;}
  .selector .chev{color:var(--text-subtle);flex-shrink:0;}

  .pin-wrap{margin-bottom:18px;}
  .pin-dots{display:flex;gap:14px;justify-content:center;padding:14px 0;}
  .pin-dot{width:48px;height:54px;border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;background:var(--bg-soft);font-family:'Poppins';font-size:22px;font-weight:700;color:var(--text);}
  .pin-dot.filled{background:var(--bg);border-color:var(--primary);}
  .pin-dot.empty .bullet{width:10px;height:10px;border-radius:50%;background:var(--text-subtle);opacity:0.4;}

  .info-line{display:flex;gap:10px;align-items:flex-start;background:var(--bg-soft);border:1px solid var(--border);border-radius:12px;padding:12px;}
  .info-line .ic{width:28px;height:28px;border-radius:50%;background:var(--primary-soft);color:var(--primary);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .info-line .t{font-size:12px;color:var(--text-muted);line-height:1.5;}

  .sticky{position:absolute;left:0;right:0;bottom:0;background:var(--bg);border-top:1px solid var(--border);padding:14px 16px 24px;}
  .btn{padding:14px;border-radius:10px;font-size:14px;font-weight:600;text-align:center;cursor:pointer;background:var(--primary);color:#fff;border:1px solid var(--primary);}

  .home-indicator{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:140px;height:5px;background:var(--text);border-radius:3px;opacity:0.25;}
</style>
</head>
<body>

<div class="phone">
  <div class="screen">

    <div class="status-bar">
      <span>9:41</span>
      <span class="icons">
        <svg width="16" height="11" viewBox="0 0 16 11" fill="currentColor"><path d="M1 7.5h2v3H1v-3zm4-2h2v5H5v-5zm4-2h2v7H9v-7zm4-2h2v9h-2v-9z"/></svg>
        <svg width="16" height="11" viewBox="0 0 16 11" fill="currentColor"><path d="M8 2C4 2 1 4 0 6c1 2 4 4 8 4s7-2 8-4c-1-2-4-4-8-4zm0 6a2 2 0 110-4 2 2 0 010 4z"/></svg>
        <svg width="24" height="11" viewBox="0 0 24 11" fill="none" stroke="currentColor" stroke-width="1"><rect x="0.5" y="0.5" width="20" height="10" rx="2"/><rect x="2" y="2" width="16" height="7" rx="1" fill="currentColor"/><rect x="21" y="3.5" width="2" height="4" rx="1" fill="currentColor"/></svg>
      </span>
    </div>

    <div class="header">
      <div class="back-btn" onclick="location.href='wallet.html'">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </div>
      <div class="title">Retirer mon argent</div>
    </div>

    <div class="content">

      <div class="balance-card">
        <div class="lbl">Solde disponible</div>
        <div class="v">145 600 F</div>
      </div>

      <div class="amount-wrap">
        <input class="amount-input" type="text" placeholder="0" value="50 000" />
        <div class="amount-suffix">F CFA</div>
      </div>

      <div class="quick-chips">
        <div class="qchip">10 000</div>
        <div class="qchip active">50 000</div>
        <div class="qchip">100 000</div>
        <div class="qchip tout">Tout</div>
      </div>

      <div class="section-title">Destinataire</div>
      <div class="selector">
        <div class="logo">OM</div>
        <div class="body">
          <div class="t">Mon numéro MoMo</div>
          <div class="s">07 58 42 19 04 · Orange Money</div>
        </div>
        <div class="chev">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
        </div>
      </div>

      <div class="pin-wrap">
        <div class="section-title">Code PIN MoMo</div>
        <div class="pin-dots">
          <div class="pin-dot filled">●</div>
          <div class="pin-dot filled">●</div>
          <div class="pin-dot empty"><span class="bullet"></span></div>
          <div class="pin-dot empty"><span class="bullet"></span></div>
        </div>
      </div>

      <div class="info-line">
        <div class="ic">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </div>
        <div class="t">Le retrait sera disponible dans ~5 minutes. Frais MoMo : 0 F (offert par FarmCash).</div>
      </div>

    </div>

    <div class="sticky">
      <div class="btn">Confirmer le retrait</div>
    </div>

    <div class="home-indicator"></div>
  </div>
</div>

</body>
</html>
