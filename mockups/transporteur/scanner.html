<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FarmCash — Scanner QR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --primary:#2E7D32;--primary-hover:#256528;--bg:#FFFFFF;
    --text:#111827;--text-muted:#6B7280;--text-subtle:#9CA3AF;
    --border:#E5E7EB;--border-strong:#D1D5DB;--bg-soft:#F9FAFB;
    --error:#C62828;--primary-soft:#E8F5E9;
    --warn:#B45309;--warn-soft:#FEF3C7;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
  html,body{font-family:'Inter',sans-serif;background:#ECEFF1;color:var(--text);}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;}

  .phone{width:390px;height:844px;background:#1a1a1a;border-radius:50px;padding:14px;box-shadow:0 30px 60px rgba(0,0,0,0.18);position:relative;}
  .phone::before{content:"";position:absolute;top:14px;left:50%;transform:translateX(-50%);width:130px;height:32px;background:#1a1a1a;border-radius:0 0 22px 22px;z-index:10;}
  .screen{width:100%;height:100%;background:#1a1a1a;border-radius:38px;overflow:hidden;position:relative;display:flex;flex-direction:column;}

  .status-bar{height:48px;padding:18px 30px 0;display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:600;color:#fff;flex-shrink:0;}
  .status-bar .icons{display:flex;gap:6px;align-items:center;color:#fff;}

  /* HEADER TRANSPARENT */
  .top-bar{padding:8px 16px 12px;display:flex;align-items:center;justify-content:space-between;background:#1a1a1a;}
  .top-title{flex:1;text-align:center;color:#fff;font-size:14px;font-weight:600;margin-left:40px;}
  .close-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;background:rgba(255,255,255,0.1);border-radius:50%;}

  /* CAMERA AREA */
  .camera{flex:1;background:#1a1a1a;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;}

  /* SCAN FRAME */
  .frame-wrap{position:relative;width:240px;height:240px;margin-bottom:20px;}
  .frame{position:absolute;inset:0;}
  .corner{position:absolute;width:32px;height:32px;border:3px solid var(--primary);}
  .corner.tl{top:0;left:0;border-right:none;border-bottom:none;border-top-left-radius:8px;}
  .corner.tr{top:0;right:0;border-left:none;border-bottom:none;border-top-right-radius:8px;}
  .corner.bl{bottom:0;left:0;border-right:none;border-top:none;border-bottom-left-radius:8px;}
  .corner.br{bottom:0;right:0;border-left:none;border-top:none;border-bottom-right-radius:8px;}
  .scan-line{position:absolute;left:8px;right:8px;top:50%;height:2px;background:var(--primary);transform:translateY(-50%);opacity:0.85;}

  .scan-hint{color:#fff;font-size:13px;font-weight:500;text-align:center;padding:0 40px;opacity:0.95;line-height:1.5;}

  /* BOTTOM ACTIONS */
  .actions{padding:30px 40px 14px;display:flex;justify-content:center;gap:24px;}
  .action-btn{width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.4);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;}

  .manual{padding:0 20px 24px;text-align:center;}
  .manual a{color:#fff;font-size:13px;font-weight:600;text-decoration:underline;cursor:pointer;}

  .bottom-nav{height:56px;background:#1a1a1a;border-top:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;flex-shrink:0;}
  .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:rgba(255,255,255,0.35);cursor:default;font-size:11px;font-weight:500;}

  .home-indicator{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:140px;height:5px;background:#fff;border-radius:3px;opacity:0.4;}
</style>
</head>
<body>

<div class="phone">
  <div class="screen">

    <div class="status-bar">
      <span>9:41</span>
      <span class="icons">
        <svg width="16" height="11" viewBox="0 0 16 11" fill="currentColor"><path d="M1 7.5h2v3H1v-3zm4-2h2v5H5v-5zm4-2h2v7H9v-7zm4-2h2v9h-2v-9z"/></svg>
        <svg width="16" height="11" viewBox="0 0 16 11" fill="currentColor"><path d="M8 2C4 2 1 4 0 6c1 2 4 4 8 4s7-2 8-4c-1-2-4-4-8-4zm0 6a2 2 0 110-4 2 2 0 010 4z"/></svg>
        <svg width="24" height="11" viewBox="0 0 24 11" fill="none" stroke="currentColor" stroke-width="1"><rect x="0.5" y="0.5" width="20" height="10" rx="2"/><rect x="2" y="2" width="16" height="7" rx="1" fill="currentColor"/><rect x="21" y="3.5" width="2" height="4" rx="1" fill="currentColor"/></svg>
      </span>
    </div>

    <div class="top-bar">
      <div class="top-title">Scanner le QR</div>
      <div class="close-btn" onclick="location.href='mission_en_route.html'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </div>
    </div>

    <div class="camera">

      <div class="frame-wrap">
        <div class="frame">
          <div class="corner tl"></div>
          <div class="corner tr"></div>
          <div class="corner bl"></div>
          <div class="corner br"></div>
          <div class="scan-line"></div>
        </div>
      </div>

      <div class="scan-hint">Pointe la caméra vers le QR du producteur</div>

      <div class="actions">
        <div class="action-btn">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        </div>
        <div class="action-btn">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </div>
      </div>

      <div class="manual">
        <a onclick="location.href='enlevement_confirme.html'">Saisir le code manuellement</a>
      </div>

    </div>

    <div class="bottom-nav">
      <div class="nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/></svg>
        <span>Accueil</span>
      </div>
      <div class="nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 3h15v13H1z"/><path d="M16 8h4l3 4v4h-7"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
        <span>Missions</span>
      </div>
      <div class="nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.4 8.4 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.4 8.4 0 01-3.8-.9L3 21l1.9-5.7a8.4 8.4 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.4 8.4 0 013.8-.9h.5a8.5 8.5 0 018 8z"/></svg>
        <span>Messages</span>
      </div>
      <div class="nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Profil</span>
      </div>
    </div>

    <div class="home-indicator"></div>
  </div>
</div>

</body>
</html>
